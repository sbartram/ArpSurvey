{{- if .Values.secret.create -}}
{{- if not .Values.secret.databaseUrl -}}
{{- fail "secret.databaseUrl is required when secret.create=true (set via -f values-secret.yaml)" -}}
{{- end -}}
{{- if not .Values.secret.flaskSecretKey -}}
{{- fail "secret.flaskSecretKey is required when secret.create=true (set via -f values-secret.yaml)" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "arp-survey.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secret.databaseUrl | quote }}
  flask-secret-key: {{ .Values.secret.flaskSecretKey | quote }}
{{- end }}
