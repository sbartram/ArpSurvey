{% if success %}
<div style="padding:8px 12px;background:var(--green-bg);color:var(--green);border-radius:var(--radius);font-size:13px">
  {{ message }}
</div>
{% else %}
<div style="padding:8px 12px;background:var(--red-bg);color:var(--red);border-radius:var(--radius);font-size:13px">
  {{ message }}
</div>
{% endif %}
