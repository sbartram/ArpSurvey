{% for t in targets_with_moon %}
<div style="display:flex;align-items:center;margin-bottom:2px;font-size:12px">
  <div style="width:60px;text-align:right;margin-right:8px;color:var(--text2)">Arp {{ t.arp }}</div>
  <div style="width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">{{ t.name }}</div>
  <span class="badge {{ t.today_risk }}" style="width:20px;text-align:center;margin-right:8px">{{ t.today_risk }}</span>
  <div style="display:flex;gap:1px">
    {% for w in t.windows %}
      {% if w.r == "G" %}
        <span class="strip-day" style="background:#97C459" title="{{ w.d }}"></span>
      {% elif w.r == "M" %}
        <span class="strip-day" style="background:#EF9F27" title="{{ w.d }}"></span>
      {% else %}
        <span class="strip-day" style="background:#E24B4A" title="{{ w.d }}"></span>
      {% endif %}
    {% endfor %}
  </div>
</div>
{% endfor %}
{% if not targets_with_moon %}
<div class="empty-state">No targets match the current filter.</div>
{% endif %}
